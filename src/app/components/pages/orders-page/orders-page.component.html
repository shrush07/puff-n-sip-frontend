<div class="orders-container">
  <h2 class="orders-header">My Orders</h2>

  <!-- FILTER BUTTONS -->
  <div class="filter-buttons">
    <button 
      [class.active]="selectedStatus === 'COMPLETED'"
      (click)="onFilterChange('COMPLETED')">
      Completed
    </button>

    <button 
      [class.active]="selectedStatus === 'NEW'"
      (click)="onFilterChange('NEW')">
      Uncompleted
    </button>

    <button 
      [class.active]="selectedStatus === 'ALL'"
      (click)="onFilterChange('ALL')">
      All
    </button>
  </div>

  <!-- TABLE -->
  <table *ngIf="filteredOrders.length > 0; else noOrders" class="order-table">
    <thead>
      <tr>
        <th>Order ID</th>
        <th>Date</th>
        <th>Status</th>
        <th>Total</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let order of filteredOrders">
        <td class="order-id">{{ order._id }}</td>
        <td>{{ order.createdAt | date:'mediumDate' }}</td>

        <td>
          <span 
            class="status"
            [ngClass]="{
              'completed': order.status === 'COMPLETED',
              'pending': order.status === 'NEW'
            }">
            {{ getDisplayStatus(order.status) }}
          </span>
        </td>

        <td class="price">₹{{ order.totalPrice }}</td>
      </tr>
    </tbody>
  </table>

  <ng-template #noOrders>
    <p class="no-orders">No orders found.</p>
  </ng-template>
</div>
